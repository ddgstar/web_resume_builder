services:
  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    ports:
      - "8080:8080"
    volumes:
      - ./Backend/data:/app/data
      - ./Backend/prisma:/app/prisma
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  frontend:
    build:
      context: ./FrontEnd
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
